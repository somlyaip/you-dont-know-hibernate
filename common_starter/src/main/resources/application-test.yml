spring:
  # Configure Spring Boot's Docker Compose integration for tests
  docker:
    compose:
      file:
        - ../docker-compose.yml
      skip.in-tests: false
  jpa:
    properties:
      hibernate:
        use_sql_comments: true
        generate_statistics: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.stat: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE # for SpringBoot 3.*
#    org.hibernate.type.descriptor.sql.BasicBinder: TRACE # for SpringBoot 2.*
