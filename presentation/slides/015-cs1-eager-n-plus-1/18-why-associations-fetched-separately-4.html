<section>
  <h3>Why associations are fetched separately? #4</h3>

  <ul>
    <li>However, using the previous query, only the main entity will be initialized</li>
    <li>Then, Hibernate issues a secondary select to initialize the associated field using the @JoinColumn (FK)</li>
  </ul>

  <source-code language="sql">
    select p1_0.id, p1_0.name
    from project p1_0
    where p1_0.id = 1;
  </source-code>
</section>
